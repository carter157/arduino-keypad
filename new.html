<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCP Access Console</title>
<style>
    body {
        margin: 0;
        background: #0d0f12;
        font-family: Arial, sans-serif;
        color: #e5e5e5;
        overflow: hidden;
    }

    h1 {
        text-align: center;
        padding: 10px;
        margin: 0;
        background: #111418;
        border-bottom: 2px solid #1f242b;
        color: #6ab0ff;
        letter-spacing: 2px;
    }

    #container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: auto auto 1fr;
        gap: 10px;
        padding: 10px;
        height: calc(100vh - 60px);
        box-sizing: border-box;
    }

    .panel {
        background: #14171c;
        border: 1px solid #1f242b;
        border-radius: 6px;
        padding: 10px;
        box-shadow: 0 0 10px #000 inset;
    }

    .title {
        font-size: 14px;
        margin-bottom: 6px;
        color: #6ab0ff;
        text-transform: uppercase;
    }

    #lcdBox {
        font-family: "Courier New", monospace;
        background: #0a0c0f;
        border: 1px solid #2a2f38;
        padding: 10px;
        height: 60px;
        color: #00ff9d;
        font-size: 18px;
        white-space: pre-line;
    }

    #terminal {
        background: #0a0c0f;
        border: 1px solid #2a2f38;
        padding: 10px;
        height: 100%;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        color: #9ecbff;
        font-size: 14px;
    }

    #statusGrid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
    }

    .statusCard {
        background: #0f1115;
        border: 1px solid #2a2f38;
        padding: 10px;
        border-radius: 6px;
        text-align: center;
        font-size: 16px;
    }

    #proximityBar {
        width: 100%;
        height: 20px;
        background: #1a1f26;
        border-radius: 4px;
        overflow: hidden;
        margin-top: 5px;
    }

    #proxFill {
        height: 100%;
        width: 0%;
        background: #00ff9d;
        transition: width 0.2s linear;
    }

    #banner {
        grid-column: span 2;
        background: #8b0000;
        padding: 10px;
        text-align: center;
        font-size: 20px;
        font-weight: bold;
        display: none;
        border-radius: 6px;
        animation: flash 1s infinite;
    }

    @keyframes flash {
        0% { opacity: 1; }
        50% { opacity: 0.4; }
        100% { opacity: 1; }
    }
</style>
</head>
<body>

<h1>SCP ACCESS CONTROL CONSOLE</h1>

<div id="container">

    <div id="banner">EMERGENCY ACTIVE</div>

    <div class="panel">
        <div class="title">LCD Display</div>
        <div id="lcdBox">Waiting...</div>
    </div>

    <div class="panel">
        <div class="title">Proximity Sensor</div>
        <div id="proximityBar"><div id="proxFill"></div></div>
    </div>

    <div class="panel">
        <div class="title">System Status</div>
        <div id="statusGrid">
            <div class="statusCard" id="stateCard">STATE: READY</div>
            <div class="statusCard" id="levelCard">LEVEL: 0</div>
            <div class="statusCard" id="eventCard">EVENT: NONE</div>
        </div>
    </div>

    <div class="panel">
        <div class="title">Terminal Log</div>
        <div id="terminal"></div>
    </div>

</div>

<script>
let terminal = document.getElementById("terminal");
let lcdBox = document.getElementById("lcdBox");
let stateCard = document.getElementById("stateCard");
let levelCard = document.getElementById("levelCard");
let eventCard = document.getElementById("eventCard");
let proxFill = document.getElementById("proxFill");
let banner = document.getElementById("banner");

// Auto-scroll terminal
function log(msg) {
    terminal.innerHTML += msg + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
}

// Serial message parser
if (navigator.serial) {
    navigator.serial.requestPort().then(async port => {
        await port.open({ baudRate: 9600 });
        const decoder = new TextDecoderStream();
        port.readable.pipeTo(decoder.writable);
        const reader = decoder.readable.getReader();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            if (!value) continue;

            let line = value.trim();

            // LCD
            if (line.startsWith("LCD:")) {
                lcdBox.textContent = line.substring(4);
            }

            // Debug log
            else if (line.startsWith("DBG:")) {
                log(line.substring(4));
            }

            // Proximity
            else if (line.startsWith("US:")) {
                let dist = parseInt(line.substring(3));
                let pct = Math.max(0, Math.min(100, (400 - dist) / 4));
                proxFill.style.width = pct + "%";
            }

            // State
            else if (line.startsWith("STATE:")) {
                let s = line.substring(6);
                stateCard.textContent = "STATE: " + s;

                if (s !== "READY") {
                    banner.style.display = "block";
                } else {
                    banner.style.display = "none";
                }
            }

            // Level
            else if (line.startsWith("LEVEL:")) {
                levelCard.textContent = "LEVEL: " + line.substring(6);
            }

            // Event
            else if (line.startsWith("EVENT:")) {
                eventCard.textContent = "EVENT: " + line.substring(6);
            }
        }
    });
} else {
    log("Web Serial API not supported in this browser.");
}
</script>

</body>
</html>
