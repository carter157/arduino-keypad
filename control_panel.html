<!DOCTYPE html>
<html>
<head>
<title>SCP Control Panel</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* ---------------- GLOBAL STYLE ---------------- */
body {
    margin: 0;
    background: #0a0a0d;
    font-family: Consolas, monospace;
    color: #e0e0e0;
    overflow-x: hidden;
}

h1 {
    text-align: center;
    margin-top: 20px;
    color: #ff3b3b;
    text-shadow: 0 0 10px #ff0000;
}

/* ---------------- NAVIGATION ---------------- */
.navbar {
    display: flex;
    justify-content: space-around;
    background: #111;
    padding: 12px;
    border-bottom: 2px solid #ff0000;
}

.navbar button {
    background: #1a1a1d;
    border: 1px solid #ff3b3b;
    color: #ff3b3b;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 16px;
}

.navbar button.active {
    background: #ff3b3b;
    color: black;
}

/* ---------------- PAGE CONTAINERS ---------------- */
.page {
    display: none;
    padding: 20px;
}

.activePage {
    display: block;
}

/* ---------------- KEYPAD ---------------- */
#display {
    width: 260px;
    height: 50px;
    margin: 20px auto;
    background: #000;
    border: 2px solid #ff3b3b;
    border-radius: 8px;
    font-size: 28px;
    padding-top: 10px;
    letter-spacing: 4px;
    text-align: center;
    color: #ff3b3b;
    text-shadow: 0 0 8px #ff0000;
}

.keypad {
    width: 260px;
    margin: 20px auto;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.keypad button, #send, #clear {
    background: #1a1a1d;
    border: 2px solid #ff3b3b;
    color: #ff3b3b;
    font-size: 24px;
    padding: 20px;
    border-radius: 8px;
    transition: 0.2s;
}

.keypad button:hover, #send:hover, #clear:hover {
    background: #ff3b3b;
    color: black;
    transform: scale(1.05);
}

#send, #clear {
    width: 260px;
    margin: 10px auto;
    display: block;
}

/* ---------------- TERMINAL ---------------- */
#terminal {
    width: 90%;
    height: 300px;
    margin: auto;
    background: black;
    border: 2px solid #ff3b3b;
    padding: 10px;
    overflow-y: auto;
    color: #00ff88;
    font-size: 14px;
}

/* ---------------- VIRTUAL LCD ---------------- */
#lcd {
    width: 300px;
    height: 90px;
    margin: auto;
    background: #003b2f;
    border: 3px solid #00ffcc;
    border-radius: 8px;
    color: #00ffcc;
    font-size: 22px;
    padding: 10px;
    white-space: pre-line;
    text-shadow: 0 0 6px #00ffcc;
}

/* ---------------- EMERGENCY BANNER ---------------- */
#bannerAlert {
    display: none;
    width: 100%;
    padding: 20px;
    text-align: center;
    font-size: 26px;
    font-weight: bold;
    background: red;
    color: white;
    position: fixed;
    top: 0;
    left: 0;
    animation: slideDown 0.5s ease-out;
}

@keyframes slideDown {
    from { top: -100px; }
    to { top: 0; }
}
</style>
</head>

<body>

<h1>SCP CONTROL PANEL</h1>

<div class="navbar">
    <button onclick="switchPage('keypadPage')" class="active">Keypad</button>
    <button onclick="switchPage('lcdPage')">LCD</button>
    <button onclick="switchPage('terminalPage')">Terminal</button>
    <button onclick="switchPage('diagPage')">Diagnostics</button>
    <button onclick="switchPage('emergencyPage')">Emergencies</button>
    <button onclick="switchPage('settingsPage')">Settings</button>
</div>

<div id="bannerAlert"></div>

<!-- ---------------- KEYPAD PAGE ---------------- -->
<div id="keypadPage" class="page activePage">
    <div id="display"></div>

    <div class="keypad">
        <button onclick="press('1')">1</button>
        <button onclick="press('2')">2</button>
        <button onclick="press('3')">3</button>
        <button onclick="press('4')">4</button>
        <button onclick="press('5')">5</button>
        <button onclick="press('6')">6</button>
        <button onclick="press('7')">7</button>
        <button onclick="press('8')">8</button>
        <button onclick="press('9')">9</button>
        <button onclick="press('*')">*</button>
        <button onclick="press('0')">0</button>
        <button onclick="press('#')">#</button>
    </div>

    <button id="send" onclick="sendCode()">SEND</button>
    <button id="clear" onclick="clearDisplay()">CLEAR</button>
</div>

<!-- ---------------- LCD PAGE ---------------- -->
<div id="lcdPage" class="page">
    <h2 style="text-align:center;">Virtual LCD</h2>
    <div id="lcd">Waiting for data...</div>
</div>

<!-- ---------------- TERMINAL PAGE ---------------- -->
<div id="terminalPage" class="page">
    <h2 style="text-align:center;">Terminal Output</h2>
    <div id="terminal"></div>
</div>

<!-- ---------------- DIAGNOSTICS PAGE ---------------- -->
<div id="diagPage" class="page">
    <h2>Diagnostics</h2>
    <p>Status: <span id="status">Disconnected</span></p>
</div>

<!-- ---------------- EMERGENCY PAGE ---------------- -->
<div id="emergencyPage" class="page">
    <h2>Emergency Controls</h2>
    <button onclick="triggerBanner('LOCKDOWN ACTIVE')">Trigger Lockdown</button>
    <button onclick="triggerBanner('FIRE EMERGENCY')">Trigger Fire</button>
    <button onclick="triggerBanner('GAS LEAK DETECTED')">Trigger Gas</button>
</div>

<!-- ---------------- SETTINGS PAGE ---------------- -->
<div id="settingsPage" class="page">
    <h2>Settings</h2>
    <p>More options coming soon.</p>
</div>

<script>
/* ---------------- PAGE SWITCHING ---------------- */
function switchPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('activePage'));
    document.getElementById(page).classList.add('activePage');

    document.querySelectorAll('.navbar button').forEach(b => b.classList.remove('active'));
    event.target.classList.add('active');
}

/* ---------------- KEYPAD LOGIC ---------------- */
let display = document.getElementById("display");
let terminal = document.getElementById("terminal");
let lcd = document.getElementById("lcd");
let port, writer, reader;

function press(num) {
    display.innerHTML += num;
}

function clearDisplay() {
    display.innerHTML = "";
}

async function sendCode() {
    if (!writer) await connectSerial();

    let code = display.innerHTML;
    if (code.length === 0) return;

    const encoder = new TextEncoder();
    await writer.write(encoder.encode(code + "\n"));

    logTerminal("> Sent: " + code);
    clearDisplay();
}

/* ---------------- SERIAL CONNECTION ---------------- */
async function connectSerial() {
    port = await navigator.serial.requestPort();
    await port.open({ baudRate: 9600 });

    writer = port.writable.getWriter();
    reader = port.readable.getReader();

    logTerminal("Connected to Arduino");
    document.getElementById("status").innerText = "Connected";

    readLoop();
}

async function readLoop() {
    const decoder = new TextDecoder();

    while (true) {
        const { value, done } = await reader.read();
        if (done) break;

        let text = decoder.decode(value);

        logTerminal(text);
        lcd.innerText = text;
    }
}

/* ---------------- TERMINAL LOGGING ---------------- */
function logTerminal(msg) {
    terminal.innerHTML += msg + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
}

/* ---------------- EMERGENCY BANNER ---------------- */
function triggerBanner(text) {
    let banner = document.getElementById("bannerAlert");
    banner.innerText = text;
    banner.style.display = "block";

    setTimeout(() => {
        banner.style.display = "none";
    }, 4000);
}
</script>

</body>
</html>
