<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SCP Console</title>
<style>
    body {
        margin: 0;
        background: #000;
        color: #00ff66;
        font-family: "Courier New", monospace;
    }

    /* TOP BAR */
    #topbar {
        height: 50px;
        background: #000;
        border-bottom: 2px solid #00ff66;
        display: flex;
        align-items: center;
        padding-left: 10px;
    }

    .tab {
        padding: 10px 20px;
        margin-right: 10px;
        background: #001100;
        border: 1px solid #00ff66;
        cursor: pointer;
        color: #00ff66;
        text-transform: uppercase;
    }

    .activeTab {
        background: #003300;
    }

    .panel {
        display: none;
        padding: 20px;
    }

    #lcdBox {
        width: 100%;
        height: 120px;
        border: 2px solid #00ff66;
        padding: 10px;
        white-space: pre-wrap;
    }

    #terminal {
        width: 100%;
        height: 300px;
        border: 2px solid #00ff66;
        padding: 10px;
        overflow-y: auto;
    }

    /* KEYPAD */
    #keypadPanel {
        position: fixed;
        bottom: -350px;
        left: 0;
        width: 100%;
        height: 350px;
        background: #000;
        border-top: 2px solid #00ff66;
        transition: bottom .3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #keypadPanel.active {
        bottom: 0;
    }

    #keypadDisplay {
        width: 260px;
        height: 50px;
        border: 2px solid #00ff66;
        text-align: center;
        line-height: 50px;
        font-size: 32px;
        margin-bottom: 20px;
    }

    .keyRow { display: flex; justify-content: center; }
    .key {
        width: 70px;
        height: 70px;
        margin: 5px;
        font-size: 28px;
        background: #001100;
        border: 2px solid #00ff66;
        color: #00ff66;
        cursor: pointer;
    }
</style>
</head>
<body>

<div id="topbar">
    <div class="tab activeTab" data-target="dash">Dashboard</div>
    <div class="tab" data-target="term">Terminal</div>
    <div class="tab" id="keypadBtn">KEYPAD</div>
    <div class="tab" id="connectBtn">CONNECT</div> <!-- ⭐ YOU WILL SEE THIS -->
</div>

<!-- DASHBOARD -->
<div id="dash" class="panel" style="display:block;">
    <h2>SCP SYSTEM</h2>
    <div id="lcdBox">Awaiting data...</div>
</div>

<!-- TERMINAL -->
<div id="term" class="panel">
    <h2>Terminal Log</h2>
    <div id="terminal"></div>
</div>

<!-- KEYPAD -->
<div id="keypadPanel">
    <div>
        <div id="keypadDisplay">----</div>

        <div class="keyRow">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
        </div>
        <div class="keyRow">
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
        </div>
        <div class="keyRow">
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
        </div>
        <div class="keyRow">
            <button class="key">C</button>
            <button class="key">0</button>
            <button class="key">E</button>
        </div>
    </div>
</div>

<script>
/* TAB SWITCHING */
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        let target = tab.dataset.target;
        if (target) {
            document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
            document.getElementById(target).style.display = "block";

            document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
            tab.classList.add("activeTab");
        }
    });
});

/* TERMINAL LOG */
function log(msg) {
    const t = document.getElementById("terminal");
    t.innerHTML += msg + "<br>";
    t.scrollTop = t.scrollHeight;
}

/* WEB SERIAL */
let port, reader, writer;

async function connectSerial() {
    try {
        port = await navigator.serial.requestPort();
        await port.open({ baudRate: 9600 });

        writer = port.writable.getWriter();
        reader = port.readable.getReader();

        log("CONNECTED");
        readLoop();
    } catch (e) {
        log("ERROR: " + e);
    }
}

async function readLoop() {
    const decoder = new TextDecoder();
    let buffer = "";

    while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value);
        let lines = buffer.split("\n");
        buffer = lines.pop();
        lines.forEach(processLine);
    }
}

function processLine(line) {
    line = line.trim();
    if (!line) return;

    log("&gt; " + line);

    if (line.startsWith("LCD:")) {
        document.getElementById("lcdBox").textContent = line.substring(4);
    }
}

/* CONNECT BUTTON */
document.getElementById("connectBtn").addEventListener("click", () => {
    connectSerial();
});

/* KEYPAD */
let keypadPanel = document.getElementById("keypadPanel");
let keypadBtn = document.getElementById("keypadBtn");
let keypadDisplay = document.getElementById("keypadDisplay");
let keypadInput = "";

keypadBtn.addEventListener("click", () => {
    keypadPanel.classList.add("active");
    keypadInput = "";
    keypadDisplay.textContent = "----";
});

document.querySelectorAll(".key").forEach(btn => {
    btn.addEventListener("click", () => {
        let v = btn.textContent;

        if (v === "C") {
            keypadInput = "";
            keypadDisplay.textContent = "----";
        }
        else if (v === "E") {
            if (writer) {
                writer.write(new TextEncoder().encode("CMD:" + keypadInput + "\n"));
                log("SENT CMD:" + keypadInput);
            }
            keypadPanel.classList.remove("active");
        }
        else {
            if (keypadInput.length < 4) {
                keypadInput += v;
                keypadDisplay.textContent = keypadInput.padEnd(4, "-");
            }
        }
    });
});
</script>

</body>
</html>
