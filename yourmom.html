<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SCP Facility Console</title>
<style>
    body {
        margin: 0;
        background: #0d1117;
        color: #c9d1d9;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* TOP BAR */
    #topbar {
        width: 100%;
        height: 50px;
        background: #161b22;
        display: flex;
        align-items: center;
        padding-left: 10px;
        border-bottom: 2px solid #30363d;
    }

    .tab {
        padding: 10px 20px;
        margin-right: 10px;
        background: #21262d;
        border: 1px solid #30363d;
        cursor: pointer;
        border-radius: 6px;
        transition: 0.2s;
    }

    .tab:hover {
        background: #30363d;
    }

    .activeTab {
        background: #238636;
        border-color: #2ea043;
    }

    /* PANELS */
    .panel {
        display: none;
        padding: 20px;
        height: calc(100vh - 50px);
        overflow-y: auto;
    }

    #lcdBox {
        width: 100%;
        height: 120px;
        background: #111418;
        border: 2px solid #30363d;
        border-radius: 8px;
        padding: 10px;
        font-size: 22px;
        font-family: "Courier New", monospace;
        color: #00ff9d;
    }

    #terminal {
        width: 100%;
        height: 300px;
        background: #0a0c10;
        border: 2px solid #30363d;
        border-radius: 8px;
        padding: 10px;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        font-size: 14px;
    }

    #proximityBar {
        width: 100%;
        height: 25px;
        background: #21262d;
        border-radius: 6px;
        margin-top: 10px;
        overflow: hidden;
    }

    #proximityFill {
        height: 100%;
        width: 0%;
        background: #00aaff;
    }

    /* EMERGENCY BANNER */
    #emergencyBanner {
        width: 100%;
        height: 40px;
        background: #8b0000;
        color: white;
        text-align: center;
        line-height: 40px;
        font-weight: bold;
        font-size: 20px;
        display: none;
    }

    /* KEYPAD */
    #keypadPanel {
        position: fixed;
        bottom: -450px;
        left: 0;
        width: 100%;
        height: 450px;
        background: #111418;
        border-top: 3px solid #1f242b;
        box-shadow: 0 -5px 20px #000;
        transition: bottom 0.35s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #keypadPanel.active {
        bottom: 0;
    }

    #keypadBox {
        text-align: center;
    }

    #keypadDisplay {
        width: 300px;
        height: 60px;
        background: #0a0c0f;
        border: 2px solid #2a2f38;
        color: #00ff9d;
        font-size: 40px;
        margin-bottom: 20px;
        line-height: 60px;
        font-family: "Courier New", monospace;
        border-radius: 8px;
    }

    .keyRow {
        display: flex;
        justify-content: center;
        margin-bottom: 10px;
    }

    .key {
        width: 90px;
        height: 90px;
        margin: 5px;
        font-size: 32px;
        background: #1a1e24;
        border: 2px solid #2a2f38;
        color: #9ecbff;
        border-radius: 10px;
        cursor: pointer;
        transition: 0.15s;
    }

    .key:hover {
        background: #232931;
    }

    .enter {
        background: #0044aa;
        color: white;
    }

    .cancel {
        background: #660000;
        color: white;
    }
</style>
</head>
<body>

<div id="topbar">
    <div class="tab activeTab" onclick="switchTab('dashboard', this)">Dashboard</div>
    <div class="tab" onclick="switchTab('terminalPanel', this)">Terminal</div>
    <div class="tab" onclick="switchTab('sensors', this)">Sensors</div>
    <div class="tab" id="keypadBtn">KEYPAD</div>
    <div class="tab" onclick="connectSerial()">CONNECT</div>
</div>

<div id="emergencyBanner"></div>

<!-- DASHBOARD -->
<div id="dashboard" class="panel" style="display:block;">
    <h2>LCD Display</h2>
    <div id="lcdBox">Waiting for data...</div>

    <h2>Proximity Sensor</h2>
    <div id="proximityBar"><div id="proximityFill"></div></div>

    <h2>System State</h2>
    <div id="stateBox">STATE: READY</div>

    <h2>Access Level</h2>
    <div id="levelBox">LEVEL: --</div>

    <h2>Event</h2>
    <div id="eventBox">EVENT: NONE</div>
</div>

<!-- TERMINAL -->
<div id="terminalPanel" class="panel">
    <h2>Terminal Log</h2>
    <div id="terminal"></div>
</div>

<!-- SENSORS -->
<div id="sensors" class="panel">
    <h2>Sensor Data</h2>
    <p>Live ultrasonic distance and system diagnostics appear here.</p>
</div>

<!-- KEYPAD -->
<div id="keypadPanel">
    <div id="keypadBox">
        <div id="keypadDisplay">----</div>

        <div class="keyRow">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
        </div>
        <div class="keyRow">
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
        </div>
        <div class="keyRow">
