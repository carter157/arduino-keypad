<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SCP Black-Site Console</title>
<style>
    body {
        margin: 0;
        background: #000000;
        color: #00ff66;
        font-family: "Courier New", monospace;
        overflow: hidden;
    }

    /* TOP BAR */
    #topbar {
        height: 50px;
        background: #000000;
        border-bottom: 2px solid #00ff66;
        display: flex;
        align-items: center;
        padding-left: 10px;
    }

    .tab {
        padding: 10px 20px;
        margin-right: 10px;
        background: #001100;
        border: 1px solid #00ff66;
        cursor: pointer;
        color: #00ff66;
        text-transform: uppercase;
    }

    .activeTab {
        background: #003300;
        border-color: #00ff66;
    }

    /* PANELS */
    .panel {
        display: none;
        padding: 20px;
        height: calc(100vh - 50px);
        overflow-y: auto;
    }

    /* LCD BOX */
    #lcdBox {
        width: 100%;
        height: 120px;
        background: #000000;
        border: 2px solid #00ff66;
        padding: 10px;
        font-size: 22px;
        color: #00ff66;
        white-space: pre-wrap;
    }

    /* TERMINAL */
    #terminal {
        width: 100%;
        height: 300px;
        background: #000000;
        border: 2px solid #00ff66;
        padding: 10px;
        overflow-y: auto;
        font-size: 14px;
        color: #00ff66;
    }

    /* KEYPAD */
    #keypadPanel {
        position: fixed;
        bottom: -350px;
        left: 0;
        width: 100%;
        height: 350px;
        background: #000000;
        border-top: 2px solid #00ff66;
        transition: bottom .3s ease;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    #keypadPanel.active {
        bottom: 0;
    }

    #keypadDisplay {
        width: 260px;
        height: 50px;
        background: #000000;
        border: 2px solid #00ff66;
        color: #00ff66;
        font-size: 32px;
        text-align: center;
        line-height: 50px;
        margin-bottom: 20px;
    }

    .keyRow {
        display: flex;
        justify-content: center;
    }

    .key {
        width: 70px;
        height: 70px;
        margin: 5px;
        font-size: 28px;
        background: #001100;
        border: 2px solid #00ff66;
        color: #00ff66;
        cursor: pointer;
    }

    .enter { background: #003300; }
    .cancel { background: #330000; }
</style>
</head>
<body>

<div id="topbar">
    <div class="tab activeTab" data-target="dash">Dashboard</div>
    <div class="tab" data-target="term">Terminal</div>
    <div class="tab" data-target="sens">Sensors</div>
    <div class="tab" id="keypadBtn">KEYPAD</div>
</div>

<!-- DASHBOARD -->
<div id="dash" class="panel" style="display:block;">
    <h2>SCP SYSTEM STATUS</h2>
    <div id="lcdBox">Awaiting input...</div>
</div>

<!-- TERMINAL -->
<div id="term" class="panel">
    <h2>Terminal Log</h2>
    <div id="terminal"></div>
</div>

<!-- SENSORS -->
<div id="sens" class="panel">
    <h2>Sensor Data</h2>
    <p>Sensor output will appear here.</p>
</div>

<!-- KEYPAD -->
<div id="keypadPanel">
    <div>
        <div id="keypadDisplay">----</div>

        <div class="keyRow">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
        </div>
        <div class="keyRow">
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
        </div>
        <div class="keyRow">
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
        </div>
        <div class="keyRow">
            <button class="key cancel">C</button>
            <button class="key">0</button>
            <button class="key enter">E</button>
        </div>
    </div>
</div>

<script>
// TAB SWITCHING
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        let target = tab.dataset.target;
        if (!target) return;

        document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
        document.getElementById(target).style.display = "block";

        document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
        tab.classList.add("activeTab");
    });
});

// KEYPAD
let keypadPanel = document.getElementById("keypadPanel");
let keypadBtn = document.getElementById("keypadBtn");
let keypadDisplay = document.getElementById("keypadDisplay");
let keypadInput = "";

keypadBtn.addEventListener("click", () => {
    keypadPanel.classList.add("active");
    keypadInput = "";
    keypadDisplay.textContent = "----";
});

document.querySelectorAll(".key").forEach(btn => {
    btn.addEventListener("click", () => {
        let v = btn.textContent;

        if (v === "C") {
            keypadInput = "";
            keypadDisplay.textContent = "----";
        }
        else if (v === "E") {
            alert("Keypad code: " + keypadInput);
            keypadPanel.classList.remove("active");
        }
        else {
            if (keypadInput.length < 4) {
                keypadInput += v;
                keypadDisplay.textContent = keypadInput.padEnd(4, "-");
            }
        }
    });
});
</script>

</body>
</html>
