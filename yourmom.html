<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Button Test</title>
<style>
    body { background:#0d1117; color:white; font-family:Arial; margin:0; }

    #topbar {
        height:50px; background:#161b22; display:flex; align-items:center;
        padding-left:10px; border-bottom:2px solid #30363d;
    }

    .tab {
        padding:10px 20px; margin-right:10px; background:#21262d;
        border:1px solid #30363d; border-radius:6px; cursor:pointer;
    }

    .activeTab { background:#238636; border-color:#2ea043; }

    .panel { display:none; padding:20px; }

    #keypadPanel {
        position:fixed; bottom:-300px; left:0; width:100%; height:300px;
        background:#111418; border-top:3px solid #1f242b;
        transition:bottom .3s ease; display:flex; justify-content:center;
        align-items:center;
    }

    #keypadPanel.active { bottom:0; }

    #keypadDisplay {
        width:200px; height:50px; background:#000; color:#00ff9d;
        border:2px solid #333; font-size:32px; text-align:center;
        line-height:50px; margin-bottom:20px;
    }

    .keyRow { display:flex; justify-content:center; }
    .key {
        width:70px; height:70px; margin:5px; font-size:28px;
        background:#1a1e24; border:2px solid #333; color:#9ecbff;
        border-radius:10px; cursor:pointer;
    }
</style>
</head>
<body>

<div id="topbar">
    <div class="tab activeTab" data-target="dash">Dashboard</div>
    <div class="tab" data-target="term">Terminal</div>
    <div class="tab" id="keypadBtn">KEYPAD</div>
</div>

<div id="dash" class="panel" style="display:block;">
    <h2>Dashboard</h2>
    <p>If you see this, tabs work.</p>
</div>

<div id="term" class="panel">
    <h2>Terminal</h2>
    <p>If you see this, tab switching works.</p>
</div>

<div id="keypadPanel">
    <div>
        <div id="keypadDisplay">----</div>

        <div class="keyRow">
            <button class="key">1</button>
            <button class="key">2</button>
            <button class="key">3</button>
        </div>
        <div class="keyRow">
            <button class="key">4</button>
            <button class="key">5</button>
            <button class="key">6</button>
        </div>
        <div class="keyRow">
            <button class="key">7</button>
            <button class="key">8</button>
            <button class="key">9</button>
        </div>
        <div class="keyRow">
            <button class="key">C</button>
            <button class="key">0</button>
            <button class="key">E</button>
        </div>
    </div>
</div>

<script>
// TAB SWITCHING
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        let target = tab.dataset.target;
        if (!target) return;

        document.querySelectorAll(".panel").forEach(p => p.style.display = "none");
        document.getElementById(target).style.display = "block";

        document.querySelectorAll(".tab").forEach(t => t.classList.remove("activeTab"));
        tab.classList.add("activeTab");
    });
});

// KEYPAD
let keypadPanel = document.getElementById("keypadPanel");
let keypadBtn = document.getElementById("keypadBtn");
let keypadDisplay = document.getElementById("keypadDisplay");
let keypadInput = "";

keypadBtn.addEventListener("click", () => {
    keypadPanel.classList.add("active");
    keypadInput = "";
    keypadDisplay.textContent = "----";
});

document.querySelectorAll(".key").forEach(btn => {
    btn.addEventListener("click", () => {
        let v = btn.textContent;

        if (v === "C") {
            keypadInput = "";
            keypadDisplay.textContent = "----";
        }
        else if (v === "E") {
            alert("You entered: " + keypadInput);
            keypadPanel.classList.remove("active");
        }
        else {
            if (keypadInput.length < 4) {
                keypadInput += v;
                keypadDisplay.textContent = keypadInput.padEnd(4, "-");
            }
        }
    });
});
</script>

</body>
</html>
