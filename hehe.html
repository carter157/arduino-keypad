    body {
        margin: 0;
        background: #0d1117;
        color: #c9d1d9;
        font-family: Arial, sans-serif;
        overflow: hidden;
    }

    /* TOP BAR */
    #topbar {
        width: 100%;
        height: 50px;
        background: #161b22;
        display: flex;
        align-items: center;
        padding-left: 10px;
        border-bottom: 2px solid #30363d;
    }

    .tab {
        padding: 10px 20px;
        margin-right: 10px;
        background: #21262d;
        border: 1px solid #30363d;
        cursor: pointer;
        border-radius: 6px;
        transition: 0.2s;
    }

    .tab:hover {
        background: #30363d;
    }

    .activeTab {
        background: #238636;
        border-color: #2ea043;
    }

    /* MAIN PANELS */
    .panel {
        display: none;
        padding: 20px;
        height: calc(100vh - 50px);
        overflow-y: auto;
    }

        padding: 10px;

    }

        font-size: 14px;
    }
