<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SCP Access Console</title>

<style>
    /* FULLSCREEN + SCALED UP */
    html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #0b0d10;
        font-family: Arial, sans-serif;
        color: #e5e5e5;
        overflow: hidden;
    }

    /* HEADER */
    #header {
        width: 100%;
        background: #111418;
        padding: 20px;
        font-size: 32px;
        text-align: center;
        color: #6ab0ff;
        letter-spacing: 3px;
        border-bottom: 3px solid #1f242b;
    }

    /* TAB BAR */
    #tabs {
        display: flex;
        background: #14171c;
        border-bottom: 2px solid #1f242b;
    }

    .tab {
        flex: 1;
        padding: 18px;
        text-align: center;
        font-size: 22px;
        cursor: pointer;
        color: #9bb7d4;
        border-right: 1px solid #1f242b;
        transition: background 0.2s;
    }

    .tab:hover {
        background: #1a1e24;
    }

    .tab.active {
        background: #1f242b;
        color: #6ab0ff;
        font-weight: bold;
    }

    /* MAIN CONTENT AREA */
    #content {
        width: 100%;
        height: calc(100% - 140px);
        display: flex;
        justify-content: center;
        align-items: center;
    }

    .page {
        display: none;
        width: 95%;
        height: 95%;
        padding: 20px;
        box-sizing: border-box;
    }

    .page.active {
        display: block;
    }

    /* PANELS */
    .panel {
        background: #14171c;
        border: 2px solid #1f242b;
        border-radius: 10px;
        padding: 20px;
        box-shadow: 0 0 20px #000 inset;
        margin-bottom: 20px;
    }

    .title {
        font-size: 26px;
        margin-bottom: 15px;
        color: #6ab0ff;
        text-transform: uppercase;
    }

    /* LCD */
    #lcdBox {
        font-family: "Courier New", monospace;
        background: #0a0c0f;
        border: 2px solid #2a2f38;
        padding: 20px;
        height: 120px;
        color: #00ff9d;
        font-size: 32px;
        white-space: pre-line;
    }

    /* TERMINAL */
    #terminal {
        background: #0a0c0f;
        border: 2px solid #2a2f38;
        padding: 20px;
        height: 80%;
        overflow-y: auto;
        font-family: "Courier New", monospace;
        color: #9ecbff;
        font-size: 22px;
    }

    /* STATUS CARDS */
    #statusGrid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 25px;
    }

    .statusCard {
        background: #0f1115;
        border: 2px solid #2a2f38;
        padding: 25px;
        border-radius: 10px;
        text-align: center;
        font-size: 28px;
    }

    /* PROXIMITY BAR */
    #proximityBar {
        width: 100%;
        height: 40px;
        background: #1a1f26;
        border-radius: 8px;
        overflow: hidden;
        margin-top: 10px;
    }

    #proxFill {
        height: 100%;
        width: 0%;
        background: #00ff9d;
        transition: width 0.2s linear;
    }

    /* EMERGENCY BANNER */
    #banner {
        width: 100%;
        padding: 20px;
        background: #8b0000;
        color: white;
        font-size: 36px;
        font-weight: bold;
        text-align: center;
        display: none;
        animation: flash 1s infinite;
        border-bottom: 3px solid #1f242b;
    }

    @keyframes flash {
        0% { opacity: 1; }
        50% { opacity: 0.4; }
        100% { opacity: 1; }
    }
</style>
</head>

<body>

<div id="header">SCP ACCESS CONTROL CONSOLE</div>
<div id="banner">EMERGENCY ACTIVE</div>

<!-- TABS -->
<div id="tabs">
    <div class="tab active" data-page="lcdPage">LCD</div>
    <div class="tab" data-page="proxPage">Proximity</div>
    <div class="tab" data-page="statusPage">Status</div>
    <div class="tab" data-page="termPage">Terminal</div>
</div>

<!-- CONTENT -->
<div id="content">

    <!-- LCD PAGE -->
    <div class="page active" id="lcdPage">
        <div class="panel">
            <div class="title">LCD Display</div>
            <div id="lcdBox">Waiting...</div>
        </div>
    </div>

    <!-- PROXIMITY PAGE -->
    <div class="page" id="proxPage">
        <div class="panel">
            <div class="title">Proximity Sensor</div>
            <div id="proximityBar"><div id="proxFill"></div></div>
        </div>
    </div>

    <!-- STATUS PAGE -->
    <div class="page" id="statusPage">
        <div class="panel">
            <div class="title">System Status</div>
            <div id="statusGrid">
                <div class="statusCard" id="stateCard">STATE: READY</div>
                <div class="statusCard" id="levelCard">LEVEL: 0</div>
                <div class="statusCard" id="eventCard">EVENT: NONE</div>
            </div>
        </div>
    </div>

    <!-- TERMINAL PAGE -->
    <div class="page" id="termPage">
        <div class="panel" style="height:100%;">
            <div class="title">Terminal Log</div>
            <div id="terminal"></div>
        </div>
    </div>

</div>

<script>
/* TAB SWITCHING */
document.querySelectorAll(".tab").forEach(tab => {
    tab.addEventListener("click", () => {
        document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
        document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));

        tab.classList.add("active");
        document.getElementById(tab.dataset.page).classList.add("active");
    });
});

/* ELEMENT REFERENCES */
let terminal = document.getElementById("terminal");
let lcdBox = document.getElementById("lcdBox");
let stateCard = document.getElementById("stateCard");
let levelCard = document.getElementById("levelCard");
let eventCard = document.getElementById("eventCard");
let proxFill = document.getElementById("proxFill");
let banner = document.getElementById("banner");

/* TERMINAL LOG */
function log(msg) {
    terminal.innerHTML += msg + "<br>";
    terminal.scrollTop = terminal.scrollHeight;
}

/* SERIAL HANDLING */
if (navigator.serial) {
    navigator.serial.requestPort().then(async port => {
        await port.open({ baudRate: 9600 });

        const decoder = new TextDecoderStream();
        port.readable.pipeTo(decoder.writable);
        const reader = decoder.readable.getReader();

        while (true) {
            const { value, done } = await reader.read();
            if (done) break;
            if (!value) continue;

            let line = value.trim();

            if (line.startsWith("LCD:")) lcdBox.textContent = line.substring(4);
            else if (line.startsWith("DBG:")) log(line.substring(4));
            else if (line.startsWith("US:")) {
                let dist = parseInt(line.substring(3));
                let pct = Math.max(0, Math.min(100, (400 - dist) / 4));
                proxFill.style.width = pct + "%";
            }
            else if (line.startsWith("STATE:")) {
                let s = line.substring(6);
                stateCard.textContent = "STATE: " + s;
                banner.style.display = (s !== "READY") ? "block" : "none";
            }
            else if (line.startsWith("LEVEL:")) {
                levelCard.textContent = "LEVEL: " + line.substring(6);
            }
            else if (line.startsWith("EVENT:")) {
                eventCard.textContent = "EVENT: " + line.substring(6);
            }
        }
    });
} else {
    log("Web Serial API not supported.");
}
</script>

</body>
</html>
